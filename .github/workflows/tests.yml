name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests (SQLite)
        run: pytest

  test-postgresql:
    name: PostgreSQL smoke + stress_db
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: broker
          POSTGRES_PASSWORD: broker
          POSTGRES_DB: broker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U broker -d broker_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,postgresql]"

      - name: Run tests (PostgreSQL)
        env:
          BROKER_POSTGRES_DSN: postgresql+asyncpg://broker:broker@localhost:5432/broker_test
        run: pytest
